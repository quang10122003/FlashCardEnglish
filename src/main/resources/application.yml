spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: FlashCard
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/vocalearn_demo_db}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        connection:
          characterEncoding: utf-8
          useUnicode: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 200MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: "${MAIL_USERNAME:abc@gmail.com}"
    password: "${MAIL_PASSWORD:}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      timeout: 60000
  cache:
    type: redis

server:
  address: 0.0.0.0
  port: 8080

jwt:
  secret: "${JWT_SECRET:Y2FyZW1hbGxvd2lzYXZlcnljb21wbGV4c2VjcmV0a2V5dGhhdGlzdmVyeWhhcmR0b2d1Zzzz}"
  accessTokenExpiration: 86400000
  renewalTokenExpiration: 604800000

minio:
  endpoint: "${MINIO_ENDPOINT:http://localhost:9000}"
  public-endpoint: "${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}"
  access-key: "${MINIO_ACCESS_KEY:admin}"
  secret-key: "${MINIO_SECRET_KEY:admin123}"
  bucket: "${MINIO_BUCKET:vocalearn}"
  default-folder: "media"

vnpay:
  tmnCode: "${VNPAY_TMN_CODE:accd}"
  hashSecret: "${VNPAY_HASH_SECRET:aaaa}"
  url: "${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}"
  returnUrl: "${VNPAY_RETURN_URL:https://unstartling-suellen-unstacked.ngrok-free.dev/api/payment/vnpay-return}"
  ipn: "${VNPAY_IPN:https://unstartling-suellen-unstacked.ngrok-free.dev/api/payment/vnpay-ipn}"

logging:
  level:
    "software.amazon.awssdk.request": DEBUG
    "software.amazon.awssdk.auth": DEBUG
    "org.springframework.web": DEBUG
    "com.fasterxml.jackson": DEBUG
